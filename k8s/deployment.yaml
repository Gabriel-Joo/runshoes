apiVersion: apps/v1
kind: Deployment
metadata:
  name: runshoes
  namespace: runshoes
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: runshoes
  template:
    metadata:
      labels:
        app: runshoes
    spec:
      initContainers:
        - name: seed-db
          image: std-harbor.kopoctc.kr/kopo17/runshoes:v1
          command:
            - sh
            - -c
            - "[ -f /data/db.json ] || cp /app/db.json.seed /data/db.json"
          volumeMounts:
            - name: data
              mountPath: /data
      containers:
        - name: runshoes
          image: std-harbor.kopoctc.kr/kopo17/runshoes:v1
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: DB_PATH
              value: /data/db.json
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /api/shoes
              port: http
            initialDelaySeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: runshoes-data